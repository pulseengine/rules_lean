name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-rules:
    name: Verify rules load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-verify-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-verify-${{ runner.os }}-
      - name: Query lean rules
        run: bazel query '//lean/...'
      - name: Query aeneas rules
        run: bazel query '//aeneas/...'

  build:
    name: Build hello (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-build-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-build-${{ runner.os }}-
      - name: Clean build cache
        run: bazel clean --expunge_async || true
      - name: Build hello_lean
        run: bazel build //examples/hello_lean:hello
      - name: Test hello_lean
        run: bazel test //examples/hello_lean:hello_test
      - name: Build multi_file
        run: bazel build //examples/multi_file:multi
      - name: Test multi_file
        run: bazel test //examples/multi_file:multi_test
      - name: Verify source copies are not symlinks (LS-006)
        run: |
          # _copy_src must produce real files, not symlinks
          copies=$(find bazel-bin/examples/hello_lean -name '*.lean' -path '*_src/*' 2>/dev/null)
          if [ -z "$copies" ]; then
            echo "ERROR: no source copies found in bazel-bin"
            exit 1
          fi
          for f in $copies; do
            if [ -L "$f" ]; then
              echo "ERROR: $f is a symlink (should be a real file)"
              exit 1
            fi
            echo "PASS: $f is a real file"
          done

  test-hash-enforcement:
    name: Test SHA-256 enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Verify missing hash fails
        run: |
          cd tests/missing_hash
          # Query the toolchain repo to force extension evaluation
          if bazel query '@lean_toolchains//:all' 2>&1; then
            echo "ERROR: should have failed with missing hash"
            exit 1
          else
            bazel query '@lean_toolchains//:all' 2>&1 | grep -q "SHA-256 hash missing"
            echo "PASS: missing hash correctly rejected"
          fi
      - name: Verify dev mode opt-out works
        run: |
          cd tests/dev_mode
          # This should succeed — extension allows empty hashes in dev mode
          bazel query '@lean_toolchains//:all' 2>&1
          echo "PASS: dev mode opt-out accepted"

  test-platform-downloads:
    name: Verify all platform downloads (CC-005)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Verify all 4 platform archives download + extract with correct SHA-256
        run: |
          cd tests/platform_hashes
          for platform in darwin_aarch64 darwin_x86_64 linux_x86_64 linux_aarch64; do
            echo "--- Testing lean_${platform} ---"
            bazel query "@lean_${platform}//:lean_toolchain_info" 2>&1
            echo "PASS: lean_${platform}"
          done

  build-mathlib:
    name: Build mathlib proofs (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-mathlib-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-mathlib-${{ runner.os }}-
      - name: Build mathlib proofs
        run: bazel build //examples/mathlib_proof:nat_proofs
        timeout-minutes: 30
      - name: Test mathlib proofs
        run: bazel test //examples/mathlib_proof:nat_proofs_test
        timeout-minutes: 10
