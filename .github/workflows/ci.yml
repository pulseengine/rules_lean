name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-rules:
    name: Verify rules load (Bazel ${{ matrix.bazel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bazel: ["8.0.0", "8.6.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: 1.x
      - name: Set Bazel version
        env:
          BAZEL_VERSION: ${{ matrix.bazel }}
        run: echo "$BAZEL_VERSION" > .bazelversion
      - name: Verify rules analysis
        run: bazel query '//lean/...' '//aeneas/...'

  build:
    name: Build example (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: 1.x
      - name: Set Bazel version
        run: echo "8.0.0" > examples/hello_lean/.bazelversion
      - name: Build hello_lean example
        working-directory: examples/hello_lean
        run: bazel build //:hello
      - name: Test hello_lean example
        working-directory: examples/hello_lean
        run: bazel test //:hello_test
