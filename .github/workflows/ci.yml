name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-rules:
    name: Verify rules load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bazelisk
        run: |
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
      - name: Query lean rules
        run: bazel query '//lean/...'
      - name: Query aeneas rules
        run: bazel query '//aeneas/...'

  build:
    name: Build example (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install bazelisk
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-darwin-arm64 -o /usr/local/bin/bazel
          else
            curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
          fi
          chmod +x /usr/local/bin/bazel
      - name: Build hello_lean example
        working-directory: examples/hello_lean
        run: bazel build //:hello
      - name: Test hello_lean example
        working-directory: examples/hello_lean
        run: bazel test //:hello_test
