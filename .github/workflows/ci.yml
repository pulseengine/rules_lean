name: CI

on:
  push:
    # feature/charon-stage-2 included so the Charon smoke jobs run on this
    # branch before it lands on main; remove once merged.
    branches: [main, feature/charon-stage-2]
  pull_request:
    branches: [main]
  schedule:
    # Nightly cold-cache build of the ℝ proof guards against the Mathlib-fetch
    # bugs (full clone / version skew) regressing behind a warm cache.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  verify-rules:
    name: Verify rules load
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-verify-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-verify-${{ runner.os }}-
      - name: Query lean rules
        run: bazel query '//lean/...'
      - name: Query aeneas rules
        run: bazel query '//aeneas/...'

  build:
    name: Build hello (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - [self-hosted, linux, x64, rust-cpu]
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-build-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-build-${{ runner.os }}-
      - name: Clean build cache
        run: bazel clean --expunge_async || true
      - name: Build hello_lean
        run: bazel build //examples/hello_lean:hello
      - name: Test hello_lean
        run: bazel test //examples/hello_lean:hello_test
      - name: Build multi_file
        run: bazel build //examples/multi_file:multi
      - name: Test multi_file
        run: bazel test //examples/multi_file:multi_test
      - name: Verify source copies are not symlinks (LS-006)
        run: |
          # _copy_src must produce real files, not symlinks
          copies=$(find bazel-bin/examples/hello_lean -name '*.lean' -path '*_src/*' 2>/dev/null)
          if [ -z "$copies" ]; then
            echo "ERROR: no source copies found in bazel-bin"
            exit 1
          fi
          for f in $copies; do
            if [ -L "$f" ]; then
              echo "ERROR: $f is a symlink (should be a real file)"
              exit 1
            fi
            echo "PASS: $f is a real file"
          done

  test-hash-enforcement:
    name: Test SHA-256 enforcement
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Verify missing hash fails
        run: |
          cd tests/missing_hash
          # Query the toolchain repo to force extension evaluation
          if bazel query '@lean_toolchains//:all' 2>&1; then
            echo "ERROR: should have failed with missing hash"
            exit 1
          else
            bazel query '@lean_toolchains//:all' 2>&1 | grep -q "SHA-256 hash missing"
            echo "PASS: missing hash correctly rejected"
          fi
      - name: Verify dev mode opt-out works
        run: |
          cd tests/dev_mode
          # This should succeed — extension allows empty hashes in dev mode
          bazel query '@lean_toolchains//:all' 2>&1
          echo "PASS: dev mode opt-out accepted"
      - name: Verify Lean/Mathlib version skew fails with an actionable message
        run: |
          cd tests/version_skew
          # Must fail at resolution with the actionable skew message, NOT the
          # cryptic "no Elan detected" that lake emits on a toolchain mismatch.
          if bazel query '@mathlib//:Mathlib' 2>err.log; then
            echo "ERROR: version skew should have failed"; cat err.log; exit 1
          fi
          grep -q "requires Lean" err.log
          grep -q "align lean.toolchain" err.log
          if grep -qi "no Elan" err.log; then
            echo "ERROR: hit the cryptic Elan path instead of the actionable error"; exit 1
          fi
          echo "PASS: version skew rejected with actionable message"

  test-platform-downloads:
    name: Verify all platform downloads (CC-005)
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Verify all 4 platform archives download + extract with correct SHA-256
        run: |
          cd tests/platform_hashes
          for platform in darwin_aarch64 darwin_x86_64 linux_x86_64 linux_aarch64; do
            echo "--- Testing lean_${platform} ---"
            bazel query "@lean_${platform}//:lean_toolchain_info" 2>&1
            echo "PASS: lean_${platform}"
          done

  build-mathlib:
    name: Build mathlib proofs (Linux)
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-mathlib-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-mathlib-${{ runner.os }}-
      - name: Build mathlib proofs
        run: bazel build //examples/mathlib_proof:nat_proofs
        timeout-minutes: 30
      - name: Test mathlib proofs
        run: bazel test //examples/mathlib_proof:nat_proofs_test
        timeout-minutes: 10
      - name: Build ℝ proofs (ordered-field / Real path)
        run: bazel build //examples/real_proof:real_proofs
        timeout-minutes: 30
      - name: Test ℝ proofs (ring / linarith / sq_nonneg / mul_nonneg)
        run: bazel test //examples/real_proof:real_proofs_test --test_output=errors
        timeout-minutes: 10

  nightly-real-cold-cache:
    name: Nightly cold-cache ℝ proof
    # Schedule/dispatch only: a cold-cache run forces @mathlib re-fetch +
    # re-consolidation so the shallow-fetch and skew fixes cannot regress
    # silently behind the warm PR cache. No actions/cache here on purpose.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Cold cache (force Mathlib re-fetch + olean re-consolidation)
        run: bazel clean --expunge
      - name: Build ℝ proof from a clean cache
        run: bazel build //examples/real_proof:real_proofs
        timeout-minutes: 90
      - name: Test ℝ proof from a clean cache
        run: bazel test //examples/real_proof:real_proofs_test --test_output=errors
        timeout-minutes: 20

  build-charon:
    name: Charon toolchain smoke (Linux)
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-charon-${{ runner.os }}-${{ hashFiles('tests/charon_smoke/MODULE.bazel') }}
          restore-keys: bazel-charon-${{ runner.os }}-
      # tests/charon_smoke is its own bzlmod module that wires the Charon
      # toolchain (the root module does not). The self-hosted x64 runner is
      # linux_x86_64 — a real prebuilt, not the linux_aarch64 fail-fast stub.
      - name: Build charon version check (downloads pinned charon, asserts version)
        working-directory: tests/charon_smoke
        run: bazel build //:charon_version_check
        timeout-minutes: 20
      - name: Run charon version smoke test
        working-directory: tests/charon_smoke
        run: bazel test //:charon_version_smoke --test_output=errors
        timeout-minutes: 10

  build-charon-llbc:
    name: Charon LLBC translation (Linux)
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-charonllbc-${{ runner.os }}-${{ hashFiles('tests/charon_llbc/MODULE.bazel') }}
          restore-keys: bazel-charonllbc-${{ runner.os }}-
      # Exercises the charon_llbc rule end-to-end: Rust source -> .llbc via
      # `charon rustc` (using the bundled Rust sysroot), asserting non-empty
      # output. This is the FEAT-006 charon_llbc validation path.
      - name: Build charon_llbc check (Rust -> LLBC)
        working-directory: tests/charon_llbc
        run: bazel build //:hello_llbc_check
        timeout-minutes: 20
      # Level-1 aeneas pipeline: LLBC -> Lean via the aeneas binary (dev-mode
      # pin, no compile — does not build @aeneas_lean_lib).
      - name: Build aeneas_translate check (LLBC -> Lean)
        working-directory: tests/charon_llbc
        run: bazel build //:hello_lean_check
        timeout-minutes: 20
